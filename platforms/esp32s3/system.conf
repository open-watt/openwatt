# ESP32-S3 system configuration -- baked into binary via string import
# Runs before user startup.conf

/system/update-rate rate=20
/system/log-level severity=trace

/secret/add name=dangerzone password=ChodeChode69 services=wifi
/secret/add name=wap password=password services=wifi

# WiFi radio (single radio, STA+AP capable)
/interface/wifi add name=wifi1
/interface/wlan add name=wlan1 radio=wifi1 ssid="Danger Zone" secret=dangerzone
/interface/ap add name=wap1 radio=wifi1 ssid="ESP32-S3" secret=wap auth=wpa2

# get a DHCP lease
/protocol/dhcp/client/add name=iot interface=wlan1 add-default-route=true

# and serve DHCP to AP clients...
/protocol/ip/address/add address="192.168.1.1/24" interface=wap1
/protocol/ip/route/add destination="192.168.1.0/24" out-interface=wap1
/protocol/ip/pool/add name=ap_pool start=192.168.1.10 end=192.168.1.199
/protocol/dhcp/server/add name=ap interface=wap1 pool=ap_pool

# CAN bus via TWAI peripheral (adjust GPIOs to match board wiring)
/interface/can add name=can0 device=twai0 baud-rate=500000 tx-gpio=4 rx-gpio=5

# run some servers...
/protocol/telnet/server add name=console port=23
/apps/api add name=api http-server=webserver uri=/api
/tools/pcap/server add name=rpcap port=2002 allow-anonymous=true
