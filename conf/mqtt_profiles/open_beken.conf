#
# Legend:
#
# mqtt: topic, type[:unit], access (R/W/RW, omitted = R)
#	desc: id, display_units, sample_frequency, user_description
#	topic: Topic path with {device_id} placeholder
#
# OpenBeken MQTT Device Profile
# https://github.com/openshwprojects/OpenBK7231T_App
#
# Topic structure: {device_id}/topic_name
# Example: obk68B4AF26/voltage/get
#

parameters: device_id
mqtt-subscribe: "#"

elements:
	mqtt: {device_id}/connected, str							desc: connected
	mqtt: {device_id}/ssid, str									desc: ssid
	mqtt: {device_id}/rssi, f64									desc: rssi, dBm
	mqtt: {device_id}/mac, mac									desc: mac_address
	mqtt: {device_id}/ip, ipv4									desc: ip_address
	mqtt: {device_id}/build, str								desc: build
	mqtt: {device_id}/host, str									desc: hostname
#	mqtt: {device_id}/datetime, dt								desc: datetime # reports 0, needs to be set?
	mqtt: {device_id}/uptime, f64:s								desc: uptime, s
	mqtt: {device_id}/freeheap, f64								desc: free_memory, B
	mqtt: {device_id}/sockets, f64								desc: socket_count
	mqtt: {device_id}/1/get, bool, RW							desc: 1_onoff
		write: {device_id}/1/set
	mqtt: {device_id}/2/get, bool, RW							desc: 2_onoff
		write: {device_id}/2/set
	mqtt: {device_id}/voltage/get, f64:V						desc: voltage
	mqtt: {device_id}/current/get, f64:A						desc: current
	mqtt: {device_id}/power/get, f64:W							desc: power
	mqtt: {device_id}/power_apparent/get, f64:VA				desc: power_apparent
	mqtt: {device_id}/power_reactive/get, f64:var				desc: power_reactive
	mqtt: {device_id}/power_factor/get, f64						desc: power_factor
	mqtt: {device_id}/energycounter/get, f64:Wh					desc: energycounter
	mqtt: {device_id}/energycounter_last_hour/get, f64:Wh		desc: energycounter_last_hour, kWh, report, "Energy Counter Last Hour"
	mqtt: {device_id}/energycounter_today/get, f64:Wh			desc: energycounter_today, kWh, report, "Energy Counter Today"
	mqtt: {device_id}/energycounter_yesterday/get, f64:Wh		desc: energycounter_yesterday, kWh, report, "Energy Counter Yesterday"
	mqtt: {device_id}/energycounter_2_days_ago/get, f64:Wh		desc: energycounter_2_days_ago, kWh, report, "Energy Counter 2 Days Ago"
	mqtt: {device_id}/energycounter_3_days_ago/get, f64:Wh		desc: energycounter_3_days_ago, kWh, report, "Energy Counter 3 Days Ago"
	mqtt: {device_id}/energycounter_clear_date/get, dt			desc: energycounter_clear_date, , report, "Date the energy counter was last cleared"

device-template:
	component:
		id: info
		template: DeviceInfo
		element: type, "smart-switch"
		element: name, "OpenBeken Smart Plug"
		element-map: build, @build
	component:
		id: status
		template: DeviceStatus
		element-map: connected, @connected				desc: , report, "Connected"
		element-map: up_time, @uptime
		component:
			id: network
			template: Network
			element: mode, "wifi"
			element-map: hostname, @hostname
			element-map: socket_count, @socket_count	desc: , report, "Number of Sockets"
			component:
				id: ethernet
				template: Ethernet
				element-map: mac_address, @mac_address
			component:
				id: ip
				template: IP
				element-map: address, @ip_address
			component:
				id: wifi
				template: Wifi
				element-map: ssid, @ssid
				element-map: rssi, @rssi
	component:
		id: grid
		template: Port
		element: role, "grid"
		element: flow, "consume"
		component:
			id: meter
			template: EnergyMeter
			element: type, "single-phase"
			element-map: voltage, @voltage
			element-map: current, @current
			element-map: power, @power
			element-map: apparent, @power_apparent
			element-map: reactive, @power_reactive
			element-map: pf, @power_factor
			element-map: net, @energycounter
			element-map: counter_clear_date, @energycounter_clear_date	desc: , report, "Clear Date", "Date the energy counter was last cleared"
	component:
		id: outlet1
		template: Port
		element: role, "outlet"
		element: flow, "supply"
		component:
			id: switch
			template: Switch
			element: type, "outlet"
			element-map: switch, @1_onoff
	component:
		id: outlet2
		template: Port
		element: role, "outlet"
		element: flow, "supply"
		component:
			id: switch
			template: Switch
			element: type, "outlet"
			element-map: switch, @2_onoff
