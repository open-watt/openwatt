#
# Emporia Vue 2 Energy Monitor
#
# ESPHome-based whole-home energy monitor with 3 mains CTs + 16 circuit CTs.
# Sensors are discovered at runtime via ESPHome native API; this profile maps
# discovered sensor elements (sensors.xxx) into a structured device template.
#
# Info and status components are populated automatically by ESPHome discovery.
#
# Discovered sensor names:
#   voltage_l1, voltage_l2, voltage_l3
#   frequency_l1, frequency_l2, frequency_l3
#   power_a, power_b, power_c
#   current_a, current_b, current_c
#   power_1 .. power_16
#   current_1 .. current_16
#
# Circuit meters don't have their own voltage/frequency sensors; they alias
# the mains phase they're wired to. All circuits on Phase A (L1) for this
# installation. Adjust phase assignments to match your panel wiring.
#

device-template:
	component:
		id: mains_a
		template: EnergyMeter
		element: type, "single-phase"
		element-alias: voltage, @sensors.voltage_l1
		element-alias: frequency, @sensors.frequency_l1
		element-alias: power, @sensors.power_a
		element-alias: current, @sensors.current_a
		element-sum: import, positive_trapezoid, @mains_a.power
		element-sum: export, negative_trapezoid, @mains_a.power
	component:
		id: mains_b
		template: EnergyMeter
		element: type, "single-phase"
		element-alias: voltage, @sensors.voltage_l2
		element-alias: frequency, @sensors.frequency_l2
		element-alias: power, @sensors.power_b
		element-alias: current, @sensors.current_b
		element-sum: import, positive_trapezoid, @mains_b.power
		element-sum: export, negative_trapezoid, @mains_b.power
	component:
		id: mains_c
		template: EnergyMeter
		element: type, "single-phase"
		element-alias: voltage, @sensors.voltage_l3
		element-alias: frequency, @sensors.frequency_l3
		element-alias: power, @sensors.power_c
		element-alias: current, @sensors.current_c
		element-sum: import, positive_trapezoid, @mains_c.power
		element-sum: export, negative_trapezoid, @mains_c.power
	# Circuits 1-16: all on Phase A (L1)
	component:
		id: circuit_1
		template: EnergyMeter
		element: type, "single-phase"
		element-alias: voltage, @mains_a.voltage
		element-alias: frequency, @mains_a.frequency
		element: power, -@sensors.power_1
		element-alias: current, @sensors.current_1
		element-sum: import, positive_trapezoid, @circuit_1.power
		element-sum: export, negative_trapezoid, @circuit_1.power
