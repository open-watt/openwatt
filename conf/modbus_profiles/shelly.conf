#
# Legend:
#
# reg: number (40000), type (u16), units (10mAh)
#	desc: id, display_units, sample_frequency, user_description
#	valueid: val0, val1, ...
#	valuedesc: "Value 0", "Value 1", ...
#	map-local: device.component.element
#	map-mb: server_name, register_number_or_id
#

#
# Shelly Pro 3EM
# Three-phase energy meter (Gen2 firmware)
# https://shelly-api-docs.shelly.cloud/gen2/ComponentsAndServices/Modbus
# https://shelly-api-docs.shelly.cloud/gen2/ComponentsAndServices/EM
# https://shelly-api-docs.shelly.cloud/gen2/ComponentsAndServices/EMData
#
# Connection: Modbus TCP, default port 502
# Register type: Input registers (FC4), 3xxxx addressing
# Float encoding: IEEE 754 32-bit, big-endian (ABCD byte order)
# Energy values: Wh (not kWh)
#
# EM component register layout:
#   31000-31073: Phase A/B/C instantaneous measurements
#   Phase B registers = Phase A + 20 (e.g. voltage: 31020 → 31040)
#   Phase C registers = Phase A + 40 (e.g. voltage: 31020 → 31060)
#
# EMData component register layout:
#   31162-31164: All-phase energy totals
#   31170-31189: Phase A energy (8 floats + 4 reserved)
#   31190-31209: Phase B energy (same structure, +20)
#   31210-31229: Phase C energy (same structure, +40)
#

registers:
    # EM Component - All-phase totals
    reg: 31011, f32le, A,       desc: CurrentTotal,         A,    high,     "Total current, sum of all phases"
    reg: 31013, f32le, W,       desc: PowerTotal,           W,    realtime, "Total active power, sum of all phases"
    reg: 31015, f32le, VA,      desc: ApparentTotal,        VA,   high,     "Total apparent power, sum of all phases"

    # EM Component - Phase A
    reg: 31020, f32le, V,       desc: VoltA,                V,    realtime, "Phase A voltage"
    reg: 31022, f32le, A,       desc: CurrentA,             A,    realtime, "Phase A current"
    reg: 31024, f32le, W,       desc: PowerA,               W,    realtime, "Phase A active power (signed: +import, -export)"
    reg: 31026, f32le, VA,      desc: ApparentA,            VA,   high,     "Phase A apparent power"
    reg: 31028, f32le,          desc: PowerFactorA,         ,     high,     "Phase A power factor"
    reg: 31033, f32le, Hz,      desc: FreqA,                Hz,   high,     "Phase A frequency"

    # EM Component - Phase B
    reg: 31040, f32le, V,       desc: VoltB,                V,    realtime, "Phase B voltage"
    reg: 31042, f32le, A,       desc: CurrentB,             A,    realtime, "Phase B current"
    reg: 31044, f32le, W,       desc: PowerB,               W,    realtime, "Phase B active power (signed: +import, -export)"
    reg: 31046, f32le, VA,      desc: ApparentB,            VA,   high,     "Phase B apparent power"
    reg: 31048, f32le,          desc: PowerFactorB,         ,     high,     "Phase B power factor"
    reg: 31053, f32le, Hz,      desc: FreqB,                Hz,   high,     "Phase B frequency"

    # EM Component - Phase C
    reg: 31060, f32le, V,       desc: VoltC,                V,    realtime, "Phase C voltage"
    reg: 31062, f32le, A,       desc: CurrentC,             A,    realtime, "Phase C current"
    reg: 31064, f32le, W,       desc: PowerC,               W,    realtime, "Phase C active power (signed: +import, -export)"
    reg: 31066, f32le, VA,      desc: ApparentC,            VA,   high,     "Phase C apparent power"
    reg: 31068, f32le,          desc: PowerFactorC,         ,     high,     "Phase C power factor"
    reg: 31073, f32le, Hz,      desc: FreqC,                Hz,   high,     "Phase C frequency"

    # EM Component - Neutral and errors
    reg: 31000, u32le,          desc: Timestamp,            ,     medium,   "Timestamp of last EM measurement"
    reg: 31007, f32le, A,       desc: CurrentNeutral,       A,    high,     "Neutral current"
    reg: 31002, u16le,          desc: ErrorA,               ,     medium,   "Phase A meter error flag"
    reg: 31003, u16le,          desc: ErrorB,               ,     medium,   "Phase B meter error flag"
    reg: 31004, u16le,          desc: ErrorC,               ,     medium,   "Phase C meter error flag"
    reg: 31005, u16le,          desc: ErrorNeutral,         ,     medium,   "Neutral meter error flag"
    reg: 31006, u16le,          desc: ErrorPhaseSeq,        ,     medium,   "Phase sequence error flag"
    reg: 31009, u16le,          desc: ErrorNeutralMismatch, ,     medium,   "Neutral current mismatch flag"
    reg: 31010, u16le,          desc: ErrorNeutralOC,       ,     medium,   "Neutral overcurrent error flag"
    reg: 31030, u16le,          desc: ErrorOverpowerA,      ,     medium,   "Phase A overpower error flag"
    reg: 31031, u16le,          desc: ErrorOvervoltageA,    ,     medium,   "Phase A overvoltage error flag"
    reg: 31032, u16le,          desc: ErrorOvercurrentA,    ,     medium,   "Phase A overcurrent error flag"
    reg: 31050, u16le,          desc: ErrorOverpowerB,      ,     medium,   "Phase B overpower error flag"
    reg: 31051, u16le,          desc: ErrorOvervoltageB,    ,     medium,   "Phase B overvoltage error flag"
    reg: 31052, u16le,          desc: ErrorOvercurrentB,    ,     medium,   "Phase B overcurrent error flag"
    reg: 31070, u16le,          desc: ErrorOverpowerC,      ,     medium,   "Phase C overpower error flag"
    reg: 31071, u16le,          desc: ErrorOvervoltageC,    ,     medium,   "Phase C overvoltage error flag"
    reg: 31072, u16le,          desc: ErrorOvercurrentC,    ,     medium,   "Phase C overcurrent error flag"

    # EMData Component - All-phase energy totals (perpetual, never reset)
    reg: 31162, f32le, Wh,      desc: EnergyTotal,          Wh,   low,      "Total active energy, all phases (perpetual)"
    reg: 31164, f32le, Wh,      desc: EnergyRetTotal,       Wh,   low,      "Total active returned energy, all phases (perpetual)"

    # EMData Component - Phase A energy
    reg: 31170, f32le, Wh,      desc: EnergyA,              Wh,   low,      "Phase A total active energy (resettable)"
    reg: 31172, f32le, Wh,      desc: EnergyFundA,          Wh,   low,      "Phase A fundamental active energy"
    reg: 31174, f32le, Wh,      desc: EnergyRetA,           Wh,   low,      "Phase A total active returned energy (resettable)"
    reg: 31176, f32le, Wh,      desc: EnergyFundRetA,       Wh,   low,      "Phase A fundamental active returned energy"
    reg: 31178, f32le, VARh,    desc: EnergyReacLagA,       VARh, low,      "Phase A lagging reactive energy"
    reg: 31180, f32le, VARh,    desc: EnergyReacLeadA,      VARh, low,      "Phase A leading reactive energy"
    reg: 31182, f32le, Wh,      desc: EnergyPerpA,          Wh,   low,      "Phase A perpetual total active energy (non-resettable)"
    reg: 31184, f32le, Wh,      desc: EnergyPerpRetA,       Wh,   low,      "Phase A perpetual total active returned energy (non-resettable)"

    # EMData Component - Phase B energy
    reg: 31190, f32le, Wh,      desc: EnergyB,              Wh,   low,      "Phase B total active energy (resettable)"
    reg: 31192, f32le, Wh,      desc: EnergyFundB,          Wh,   low,      "Phase B fundamental active energy"
    reg: 31194, f32le, Wh,      desc: EnergyRetB,           Wh,   low,      "Phase B total active returned energy (resettable)"
    reg: 31196, f32le, Wh,      desc: EnergyFundRetB,       Wh,   low,      "Phase B fundamental active returned energy"
    reg: 31198, f32le, VARh,    desc: EnergyReacLagB,       VARh, low,      "Phase B lagging reactive energy"
    reg: 31200, f32le, VARh,    desc: EnergyReacLeadB,      VARh, low,      "Phase B leading reactive energy"
    reg: 31202, f32le, Wh,      desc: EnergyPerpB,          Wh,   low,      "Phase B perpetual total active energy (non-resettable)"
    reg: 31204, f32le, Wh,      desc: EnergyPerpRetB,       Wh,   low,      "Phase B perpetual total active returned energy (non-resettable)"

    # EMData Component - Phase C energy
    reg: 31210, f32le, Wh,      desc: EnergyC,              Wh,   low,      "Phase C total active energy (resettable)"
    reg: 31212, f32le, Wh,      desc: EnergyFundC,          Wh,   low,      "Phase C fundamental active energy"
    reg: 31214, f32le, Wh,      desc: EnergyRetC,           Wh,   low,      "Phase C total active returned energy (resettable)"
    reg: 31216, f32le, Wh,      desc: EnergyFundRetC,       Wh,   low,      "Phase C fundamental active returned energy"
    reg: 31218, f32le, VARh,    desc: EnergyReacLagC,       VARh, low,      "Phase C lagging reactive energy"
    reg: 31220, f32le, VARh,    desc: EnergyReacLeadC,      VARh, low,      "Phase C leading reactive energy"
    reg: 31222, f32le, Wh,      desc: EnergyPerpC,          Wh,   low,      "Phase C perpetual total active energy (non-resettable)"
    reg: 31224, f32le, Wh,      desc: EnergyPerpRetC,       Wh,   low,      "Phase C perpetual total active returned energy (non-resettable)"


device-template:
    component:
        id: info
        template: DeviceInfo
        element: type, "energy-meter"
        element: name, "Shelly Pro 3EM"
        element: manufacturer_name, "Shelly"
        element: model_name, "Pro 3EM"
    component:
        id: meter
        template: EnergyMeter
        element: type, "three-phase"
        element-map: voltage1,          @VoltA
        element-map: voltage2,          @VoltB
        element-map: voltage3,          @VoltC
        element-map: current1,          @CurrentA
        element-map: current2,          @CurrentB
        element-map: current3,          @CurrentC
        element-map: power,             @PowerTotal
        element-map: power1,            @PowerA
        element-map: power2,            @PowerB
        element-map: power3,            @PowerC
        element-map: apparent,          @ApparentTotal
        element-map: apparent1,         @ApparentA
        element-map: apparent2,         @ApparentB
        element-map: apparent3,         @ApparentC
        element-map: pf1,               @PowerFactorA
        element-map: pf2,               @PowerFactorB
        element-map: pf3,               @PowerFactorC
        element-map: frequency,         @FreqA
        # Cumulative energy — mapped to perpetual (non-resettable) counters
        element-map: import,            @EnergyTotal
        element-map: import1,           @EnergyPerpA
        element-map: import2,           @EnergyPerpB
        element-map: import3,           @EnergyPerpC
        element-map: export,            @EnergyRetTotal
        element-map: export1,           @EnergyPerpRetA
        element-map: export2,           @EnergyPerpRetB
        element-map: export3,           @EnergyPerpRetC
        # Reactive energy (lagging = import/inductive, leading = export/capacitive)
        element-map: import_reactive1,  @EnergyReacLagA
        element-map: export_reactive1,  @EnergyReacLeadA
        element-map: import_reactive2,  @EnergyReacLagB
        element-map: export_reactive2,  @EnergyReacLeadB
        element-map: import_reactive3,  @EnergyReacLagC
        element-map: export_reactive3,  @EnergyReacLeadC
