#
# Legend:
#
# reg: number (40000), type (u16le), units (10mAh)
#    desc: id, display_units, sample_frequency, user_description
#    valueid: val0, val1, ...
#    valuedesc: "Value 0", "Value 1", ...
#    map-local: device.component.element
#    map-mb: server_name, register_number_or_id
#

#
# Shelly Pro 3EM
# Three-phase energy meter (Gen2 firmware)
# https://shelly-api-docs.shelly.cloud/gen2/ComponentsAndServices/Modbus
# https://shelly-api-docs.shelly.cloud/gen2/ComponentsAndServices/EM
# https://shelly-api-docs.shelly.cloud/gen2/ComponentsAndServices/EMData
#
# Connection: Modbus TCP, default port 502
# Register type: Input registers (FC4), 3xxxx addressing
# Float encoding: IEEE 754 32-bit, big-endian (ABCD byte order)
# Energy values: Wh (not kWh)
#
# EM component register layout:
#   31000-31073: Phase A/B/C instantaneous measurements
#   Phase B registers = Phase A + 20 (e.g. voltage: 31020 → 31040)
#   Phase C registers = Phase A + 40 (e.g. voltage: 31020 → 31060)
#
# EMData component register layout:
#   31162-31164: All-phase energy totals
#   31170-31189: Phase A energy (8 floats + 4 reserved)
#   31190-31209: Phase B energy (same structure, +20)
#   31210-31229: Phase C energy (same structure, +40)
#

registers:
    reg: 30000, str6_r,         desc: Mac,                 ,     low,      "Device MAC"
    reg: 30006, str10_r,        desc: Model,               ,     low,      "Device model"
    reg: 30016, str32_r,        desc: Name,                ,     low,      "Device name"

    # EM Component - All-phase totals
    reg: 31011, f32_r, A,       desc: CurrentTotal,         A,    realtime, "Total current, sum of all phases"
    reg: 31013, f32_r, W,       desc: PowerTotal,           W,    realtime, "Total active power, sum of all phases"
    reg: 31015, f32_r, VA,      desc: ApparentTotal,        VA,   realtime, "Total apparent power, sum of all phases"

    # EM Component - Phase A
    reg: 31020, f32_r, V,       desc: VoltA,                V,    realtime, "Phase A voltage"
    reg: 31022, f32_r, A,       desc: CurrentA,             A,    realtime, "Phase A current"
    reg: 31024, f32_r, W,       desc: PowerA,               W,    realtime, "Phase A active power (signed: +import, -export)"
    reg: 31026, f32_r, VA,      desc: ApparentA,            VA,   realtime, "Phase A apparent power"
    reg: 31028, f32_r,          desc: PowerFactorA,         ,     realtime, "Phase A power factor"
    reg: 31033, f32_r, Hz,      desc: FreqA,                Hz,   realtime, "Phase A frequency"

    # EM Component - Phase B
    reg: 31040, f32_r, V,       desc: VoltB,                V,    realtime, "Phase B voltage"
    reg: 31042, f32_r, A,       desc: CurrentB,             A,    realtime, "Phase B current"
    reg: 31044, f32_r, W,       desc: PowerB,               W,    realtime, "Phase B active power (signed: +import, -export)"
    reg: 31046, f32_r, VA,      desc: ApparentB,            VA,   realtime, "Phase B apparent power"
    reg: 31048, f32_r,          desc: PowerFactorB,         ,     realtime, "Phase B power factor"
    reg: 31053, f32_r, Hz,      desc: FreqB,                Hz,   realtime, "Phase B frequency"

    # EM Component - Phase C
    reg: 31060, f32_r, V,       desc: VoltC,                V,    realtime, "Phase C voltage"
    reg: 31062, f32_r, A,       desc: CurrentC,             A,    realtime, "Phase C current"
    reg: 31064, f32_r, W,       desc: PowerC,               W,    realtime, "Phase C active power (signed: +import, -export)"
    reg: 31066, f32_r, VA,      desc: ApparentC,            VA,   realtime, "Phase C apparent power"
    reg: 31068, f32_r,          desc: PowerFactorC,         ,     realtime, "Phase C power factor"
    reg: 31073, f32_r, Hz,      desc: FreqC,                Hz,   realtime, "Phase C frequency"

    # EM Component - Neutral and errors
    reg: 31000, u32,            desc: Timestamp,            ,     medium,   "Timestamp of last EM measurement"
    reg: 31007, f32_r, A,       desc: CurrentNeutral,       A,    high,     "Neutral current"
    reg: 31002, u16,            desc: ErrorA,               ,     medium,   "Phase A meter error flag"
    reg: 31003, u16,            desc: ErrorB,               ,     medium,   "Phase B meter error flag"
    reg: 31004, u16,            desc: ErrorC,               ,     medium,   "Phase C meter error flag"
    reg: 31005, u16,            desc: ErrorNeutral,         ,     medium,   "Neutral meter error flag"
    reg: 31006, u16,            desc: ErrorPhaseSeq,        ,     medium,   "Phase sequence error flag"
    reg: 31009, u16,            desc: ErrorNeutralMismatch, ,     medium,   "Neutral current mismatch flag"
    reg: 31010, u16,            desc: ErrorNeutralOC,       ,     medium,   "Neutral overcurrent error flag"
    reg: 31030, u16,            desc: ErrorOverpowerA,      ,     medium,   "Phase A overpower error flag"
    reg: 31031, u16,            desc: ErrorOvervoltageA,    ,     medium,   "Phase A overvoltage error flag"
    reg: 31032, u16,            desc: ErrorOvercurrentA,    ,     medium,   "Phase A overcurrent error flag"
    reg: 31050, u16,            desc: ErrorOverpowerB,      ,     medium,   "Phase B overpower error flag"
    reg: 31051, u16,            desc: ErrorOvervoltageB,    ,     medium,   "Phase B overvoltage error flag"
    reg: 31052, u16,            desc: ErrorOvercurrentB,    ,     medium,   "Phase B overcurrent error flag"
    reg: 31070, u16,            desc: ErrorOverpowerC,      ,     medium,   "Phase C overpower error flag"
    reg: 31071, u16,            desc: ErrorOvervoltageC,    ,     medium,   "Phase C overvoltage error flag"
    reg: 31072, u16,            desc: ErrorOvercurrentC,    ,     medium,   "Phase C overcurrent error flag"

    # EMData Component - All-phase energy totals (perpetual, never reset)
    reg: 31162, f32_r, Wh,      desc: EnergyTotal,          Wh,   low,      "Total active energy, all phases (perpetual)"
    reg: 31164, f32_r, Wh,      desc: EnergyRetTotal,       Wh,   low,      "Total active returned energy, all phases (perpetual)"

    # EMData Component - Phase A energy
    reg: 31170, f32_r, Wh,      desc: EnergyA,              Wh,   low,      "Phase A total active energy (resettable)"
    reg: 31172, f32_r, Wh,      desc: EnergyFundA,          Wh,   low,      "Phase A fundamental active energy"
    reg: 31174, f32_r, Wh,      desc: EnergyRetA,           Wh,   low,      "Phase A total active returned energy (resettable)"
    reg: 31176, f32_r, Wh,      desc: EnergyFundRetA,       Wh,   low,      "Phase A fundamental active returned energy"
    reg: 31178, f32_r, varh,    desc: EnergyReacLagA,       varh, low,      "Phase A lagging reactive energy"
    reg: 31180, f32_r, varh,    desc: EnergyReacLeadA,      varh, low,      "Phase A leading reactive energy"
    reg: 31182, f32_r, Wh,      desc: EnergyPerpA,          Wh,   low,      "Phase A perpetual total active energy (non-resettable)"
    reg: 31184, f32_r, Wh,      desc: EnergyPerpRetA,       Wh,   low,      "Phase A perpetual total active returned energy (non-resettable)"

    # EMData Component - Phase B energy
    reg: 31190, f32_r, Wh,      desc: EnergyB,              Wh,   low,      "Phase B total active energy (resettable)"
    reg: 31192, f32_r, Wh,      desc: EnergyFundB,          Wh,   low,      "Phase B fundamental active energy"
    reg: 31194, f32_r, Wh,      desc: EnergyRetB,           Wh,   low,      "Phase B total active returned energy (resettable)"
    reg: 31196, f32_r, Wh,      desc: EnergyFundRetB,       Wh,   low,      "Phase B fundamental active returned energy"
    reg: 31198, f32_r, varh,    desc: EnergyReacLagB,       varh, low,      "Phase B lagging reactive energy"
    reg: 31200, f32_r, varh,    desc: EnergyReacLeadB,      varh, low,      "Phase B leading reactive energy"
    reg: 31202, f32_r, Wh,      desc: EnergyPerpB,          Wh,   low,      "Phase B perpetual total active energy (non-resettable)"
    reg: 31204, f32_r, Wh,      desc: EnergyPerpRetB,       Wh,   low,      "Phase B perpetual total active returned energy (non-resettable)"

    # EMData Component - Phase C energy
    reg: 31210, f32_r, Wh,      desc: EnergyC,              Wh,   low,      "Phase C total active energy (resettable)"
    reg: 31212, f32_r, Wh,      desc: EnergyFundC,          Wh,   low,      "Phase C fundamental active energy"
    reg: 31214, f32_r, Wh,      desc: EnergyRetC,           Wh,   low,      "Phase C total active returned energy (resettable)"
    reg: 31216, f32_r, Wh,      desc: EnergyFundRetC,       Wh,   low,      "Phase C fundamental active returned energy"
    reg: 31218, f32_r, varh,    desc: EnergyReacLagC,       varh, low,      "Phase C lagging reactive energy"
    reg: 31220, f32_r, varh,    desc: EnergyReacLeadC,      varh, low,      "Phase C leading reactive energy"
    reg: 31222, f32_r, Wh,      desc: EnergyPerpC,          Wh,   low,      "Phase C perpetual total active energy (non-resettable)"
    reg: 31224, f32_r, Wh,      desc: EnergyPerpRetC,       Wh,   low,      "Phase C perpetual total active returned energy (non-resettable)"

    # EM1 - ch1
    reg: 32003, f32_r, V,       desc: EM1_1_Volt,           V,    realtime, "EM1:1 voltage"
    reg: 32005, f32_r, A,       desc: EM1_1_Current,        A,    realtime, "EM1:1 current"
    reg: 32007, f32_r, W,       desc: EM1_1_Power,          W,    realtime, "EM1:1 active power"
    reg: 32009, f32_r, VA,      desc: EM1_1_Apparent,       VA,   realtime, "EM1:1 apparent power"
    reg: 32011, f32_r,          desc: EM1_1_PowerFactor,    ,     realtime, "EM1:1 power factor"
    reg: 32016, f32_r, Hz,      desc: EM1_1_Frequency,      Hz,   realtime, "EM1:1 frequency"
    # EM Component - Energy
    reg: 32302, f32_r,          desc: EM1_1_Energy,         Wh,   low,      "EM1:1 total active energy (resettable)"
    reg: 32304, f32_r,          desc: EM1_1_EnergyRet,      Wh,   low,      "EM1:1 total active returned energy (resettable)"
    reg: 32306, f32_r, varh,    desc: EM1_1_EnergyReacLag,  varh, low,      "EM1:1 lagging reactive energy"
    reg: 32308, f32_r, varh,    desc: EM1_1_EnergyReacLead, varh, low,      "EM1:1 leading reactive energy"
    reg: 32310, f32_r, Wh,      desc: EM1_1_EnergyPerp,     Wh,   low,      "EM1:1 perpetual total active energy (non-resettable)"
    reg: 32312, f32_r, Wh,      desc: EM1_1_EnergyPerpRet,  Wh,   low,      "EM1:1 perpetual total active returned energy (non-resettable)"
    # EM Component - Neutral and errors
    reg: 32000, u32,            desc: EM1_1_Timestamp,      ,     medium,  "Timestamp of last EM1:1 measurement"

    # EM1 - ch2
    reg: 32023, f32_r, V,       desc: EM1_2_Volt,           V,    realtime, "EM1:2 voltage"
    reg: 32025, f32_r, A,       desc: EM1_2_Current,        A,    realtime, "EM1:2 current"
    reg: 32027, f32_r, W,       desc: EM1_2_Power,          W,    realtime, "EM1:2 active power"
    reg: 32029, f32_r, VA,      desc: EM1_2_Apparent,       VA,   realtime, "EM1:2 apparent power"
    reg: 32031, f32_r,          desc: EM1_2_PowerFactor,    ,     realtime, "EM1:2 power factor"
    reg: 32036, f32_r, Hz,      desc: EM1_2_Frequency,      Hz,   realtime, "EM1:2 frequency"
    # EM Component - Energy
    reg: 32322, f32_r,          desc: EM1_2_Energy,         Wh,   low,      "EM1:2 total active energy (resettable)"
    reg: 32324, f32_r,          desc: EM1_2_EnergyRet,      Wh,   low,      "EM1:2 total active returned energy (resettable)"
    reg: 32326, f32_r, varh,    desc: EM1_2_EnergyReacLag,  varh, low,      "EM1:2 lagging reactive energy"
    reg: 32328, f32_r, varh,    desc: EM1_2_EnergyReacLead, varh, low,      "EM1:2 leading reactive energy"
    reg: 32330, f32_r, Wh,      desc: EM1_2_EnergyPerp,     Wh,   low,      "EM1:2 perpetual total active energy (non-resettable)"
    reg: 32332, f32_r, Wh,      desc: EM1_2_EnergyPerpRet,  Wh,   low,      "EM1:2 perpetual total active returned energy (non-resettable)"
    # EM Component - Neutral and errors
    reg: 32020, u32,            desc: EM1_2_Timestamp,      ,     medium,  "Timestamp of last EM1:2 measurement"

    # EM1 - ch3
    reg: 32043, f32_r, V,       desc: EM1_3_Volt,           V,    realtime, "EM1:3 voltage"
    reg: 32045, f32_r, A,       desc: EM1_3_Current,        A,    realtime, "EM1:3 current"
    reg: 32047, f32_r, W,       desc: EM1_3_Power,          W,    realtime, "EM1:3 active power"
    reg: 32049, f32_r, VA,      desc: EM1_3_Apparent,       VA,   realtime, "EM1:3 apparent power"
    reg: 32051, f32_r,          desc: EM1_3_PowerFactor,    ,     realtime, "EM1:3 power factor"
    reg: 32056, f32_r, Hz,      desc: EM1_3_Frequency,      Hz,   realtime, "EM1:3 frequency"
    # EM Component - Energy
    reg: 32342, f32_r,          desc: EM1_3_Energy,         Wh,   low,      "EM1:3 total active energy (resettable)"
    reg: 32344, f32_r,          desc: EM1_3_EnergyRet,      Wh,   low,      "EM1:3 total active returned energy (resettable)"
    reg: 32346, f32_r, varh,    desc: EM1_3_EnergyReacLag,  varh, low,      "EM1:3 lagging reactive energy"
    reg: 32348, f32_r, varh,    desc: EM1_3_EnergyReacLead, varh, low,      "EM1:3 leading reactive energy"
    reg: 32350, f32_r, Wh,      desc: EM1_3_EnergyPerp,     Wh,   low,      "EM1:3 perpetual total active energy (non-resettable)"
    reg: 32352, f32_r, Wh,      desc: EM1_3_EnergyPerpRet,  Wh,   low,      "EM1:3 perpetual total active returned energy (non-resettable)"
    # EM Component - Neutral and errors
    reg: 32040, u32,            desc: EM1_3_Timestamp,      ,     medium,  "Timestamp of last EM1:3 measurement"

device-template:
    model: pro_3em_3ch
    model: pro_3em_3phase
    component:
        id: info
        template: DeviceInfo
        element: type, "energy-meter"
        element: name, "Shelly Pro 3EM"
        element: manufacturer_name, "Shelly"
        element: model_name, "Pro 3EM"

    component:
        id: status
        template: DeviceStatus
        element-map: device_name, @Name
        element-map: model_id, @Model
        component:
            id: network
            template: Network
            component:
                id: ethernet
                template: Ethernet
                element-map: mac_address, @Mac

    component: [pro_3em_3phase]
        id: meter
        template: EnergyMeter
        element: type, "three-phase"
        element-map: voltage1,          @VoltA
        element-map: voltage2,          @VoltB
        element-map: voltage3,          @VoltC
        element-map: current1,          @CurrentA
        element-map: current2,          @CurrentB
        element-map: current3,          @CurrentC
        element-map: power,             @PowerTotal
        element-map: power1,            @PowerA
        element-map: power2,            @PowerB
        element-map: power3,            @PowerC
        element-map: apparent,          @ApparentTotal
        element-map: apparent1,         @ApparentA
        element-map: apparent2,         @ApparentB
        element-map: apparent3,         @ApparentC
        element-map: pf1,               @PowerFactorA
        element-map: pf2,               @PowerFactorB
        element-map: pf3,               @PowerFactorC
        element-map: frequency,         @FreqA
        # Cumulative energy - mapped to perpetual (non-resettable) counters
        element-map: import,            @EnergyTotal
        element-map: import1,           @EnergyPerpA
        element-map: import2,           @EnergyPerpB
        element-map: import3,           @EnergyPerpC
        element-map: export,            @EnergyRetTotal
        element-map: export1,           @EnergyPerpRetA
        element-map: export2,           @EnergyPerpRetB
        element-map: export3,           @EnergyPerpRetC
        # Reactive energy (lagging = import/inductive, leading = export/capacitive)
        element-map: inductive1,        @EnergyReacLagA
        element-map: capacitive1,       @EnergyReacLeadA
        element-map: inductive2,        @EnergyReacLagB
        element-map: capacitive2,       @EnergyReacLeadB
        element-map: inductive3,        @EnergyReacLagC
        element-map: capacitive3,       @EnergyReacLeadC
    component: [pro_3em_3ch]
        id: meter_1
        template: EnergyMeter
        element: type, "single-phase"
        element-map: voltage,           @EM1_1_Volt
        element-map: current,           @EM1_1_Current
        element-map: power,             @EM1_1_Power
        element-map: apparent,          @EM1_1_Apparent
        element-map: pf,                @EM1_1_PowerFactor
        element-map: frequency,         @EM1_1_Frequency
        # Cumulative energy - mapped to perpetual (non-resettable) counters
        element-map: import,            @EM1_1_Energy
        element-map: export,            @EM1_1_EnergyRet
        # Reactive energy (lagging = import/inductive, leading = export/capacitive)
        element-map: inductive,         @EM1_1_EnergyReacLag
        element-map: capacitive,        @EM1_1_EnergyReacLead
    component: [pro_3em_3ch]
        id: meter_2
        template: EnergyMeter
        element: type, "single-phase"
        element-map: voltage,           @EM1_2_Volt
        element-map: current,           @EM1_2_Current
        element-map: power,             @EM1_2_Power
        element-map: apparent,          @EM1_2_Apparent
        element-map: pf,                @EM1_2_PowerFactor
        element-map: frequency,         @EM1_2_Frequency
        # Cumulative energy - mapped to perpetual (non-resettable) counters
        element-map: import,            @EM1_2_Energy
        element-map: export,            @EM1_2_EnergyRet
        # Reactive energy (lagging = import/inductive, leading = export/capacitive)
        element-map: inductive,         @EM1_2_EnergyReacLag
        element-map: capacitive,        @EM1_2_EnergyReacLead
    component: [pro_3em_3ch]
        id: meter_3
        template: EnergyMeter
        element: type, "single-phase"
        element-map: voltage,           @EM1_3_Volt
        element-map: current,           @EM1_3_Current
        element-map: power,             @EM1_3_Power
        element-map: apparent,          @EM1_3_Apparent
        element-map: pf,                @EM1_3_PowerFactor
        element-map: frequency,         @EM1_3_Frequency
        # Cumulative energy - mapped to perpetual (non-resettable) counters
        element-map: import,            @EM1_3_Energy
        element-map: export,            @EM1_3_EnergyRet
        # Reactive energy (lagging = import/inductive, leading = export/capacitive)
        element-map: inductive,         @EM1_3_EnergyReacLag
        element-map: capacitive,        @EM1_3_EnergyReacLead
