#
# Legend:
#
# reg: number (40000), type (u16), units (10mAh)
#	desc: id, display_units, sample_frequency, user_description
#	valueid: val0, val1, ...
#	valuedesc: "Value 0", "Value 1", ...
#	map-local: device.component.element
#	map-mb: server_name, register_number_or_id
#

#
# Generic PT100 RS485 temperature transmitter (MODBUS RTU).
# Holding registers only: fn 03 read, fn 06 write. Default addr 1, 9600 8N1.
# Module range -20..+400 C; PT100 probe range -200..+550 C; accuracy +/-1%.
# Verified against hardware 2026-07-14 (regs 0..4, self-consistent).
#

enum: BaudCode
	_1200: 0, "1200"
	_2400: 1, "2400"
	_4800: 2, "4800"
	_9600: 3, "9600"
	_19200: 4, "19200"
	_38400: 5, "38400"

registers:
	reg: 40000, s16:0.1°C			desc: temperature, , high, "Measured temperature with calibration offset applied."
	reg: 40001, u16:0.1				desc: resistance, Ω, low, "Raw PT100 element resistance."
	reg: 40002, u16, RW				desc: slave_id, , config, "Modbus station address (1..247)."
	reg: 40003, enum16:BaudCode, RW	desc: baud_code, , config, "Serial baud rate."
	reg: 40004, s16:0.1°C, RW		desc: calibration, , config, "Temperature correction offset, signed."

device-template:
	component:
		id: info
		template: DeviceInfo
		element: type, "sensor"
		element: name, "PT100 Temperature Transmitter"
	component:
		id: probe
		element-map: temperature, @temperature
		element-map: resistance, @resistance
	component:
		id: config
		template: Configuration
		element-map: calibration_offset, @calibration
		component:
			id: modbus
			template: ModbusConfig
			element-map: address, @slave_id
			element-map: baud_rate, @baud_code
