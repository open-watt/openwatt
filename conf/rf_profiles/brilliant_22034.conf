#
# Brilliant 22034 ceiling fan + light - 433 MHz RF remote
#
# Captured via RTL-SDR / rtl_433 2026-07-16. OOK-PWM, EV1527-style with a ROLLING COUNTER.
# STRUCTURE FULLY SOLVED (33 bits):
#     df258  [button:4]  [counter:4]  [checksum:4]  [pad:1=1]
#     addr   function    rolls f..8   = counter^button^7
# The counter decrements f,e,d,c,b,a,9,8 (wrap), +1 globally per press (any button). checksum
# verified exact across 129 captures (0 mismatches). So we can GENERATE a valid code for any
# button + counter, not just replay - fresh code per press advancing the counter like the remote.
# Receiver behaviour: beeps once on a valid received code (address+checksum ok) = a "command
# received" ACK. Suppresses repeats: a long hold beeps ~twice then stops (same counter = same
# press, deduped) - EXCEPT the 4h timer (button 3) which beeps continuously on hold (auto-repeat?
# or it advances the counter per frame while held - untested). Unmapped nibbles 0,1,5,f: never
# sent by the remote; probed with valid generated codes -> acknowledged (beep) but INERT.
#
# This is a STATEFUL device we both drive (TX) and follow (RX). We can't read the fan's state
# directly (it's a dumb one-way receiver), so the state elements below are an INFERRED model,
# maintained by: (a) optimistic update when WE send a command, and (b) decoding the physical
# remote off the air (RX) so a human pressing buttons keeps us in sync. State can drift; RX is
# what keeps it honest. This matters because the light and direction are TOGGLES - to command
# "light off" you must know whether it's currently on, or you'll toggle it the wrong way.
#
# Raw captured codes. Directive = modulation (ook); fields = name, button nibble, sample replay
# code. Timing/polarity is shared (header above). The button nibble is the stable identifier for
# RX matching (the counter+checksum vary per press). The MAPPING from a state element to the
# code(s) to send (and the toggle state-machine) is NOT expressible in profiles yet - the
# long-standing "commands" TODO - so it lives in the binding for now.
#
codes:
	ook: fan_off,  8, df2588968
	ook: speed1,   e, df258ef68
	ook: speed2,   d, df258de48
	ook: speed3,   c, df258cd68
	ook: speed4,   b, df258bc08
	ook: speed5,   a, df258ab68
	ook: speed6,   9, df2589a48
	ook: timer_2h, 4, df25848b8
	ook: timer_4h, 3, df2583fb8
	ook: timer_8h, 2, df2582eb8
	ook: reverse,  6, df2586dc8         # single button; fan toggles direction internally each press
	ook: light,    7, df2587998         # single button; light module owns on/off/colour-temp cycling

device-template:
	component:
		id: info
		template: DeviceInfo
		element: type, "ceiling-fan"
		element: name, "Brilliant 22034 Ceiling Fan"
		element: manufacturer, "Brilliant"
		element: model, "22034"
	component:
		id: status
		template: DeviceStatus
		# one-way RF: no telemetry. Best we have is when we last heard/sent a command.
		element: last_command, dt
	component:
		id: fan
		# speed is ABSOLUTE: a speed command sets it outright, so writing this is deterministic.
		element: speed, enum(off,1,2,3,4,5,6)
		# direction is a TOGGLE (reverse button flips it): binding must know current state to set.
		element: direction, enum(forward,reverse)
		# timers are one-shot commands; state is best-effort.
		element: timer, enum(none,2h,4h,8h)
	component:
		id: light
		# TOGGLE: light-button presses cycle on/off (+colour-temp with fast repeats, in the light
		# module - not trackable from RF alone). We model on/off; colour-temp is out of reach.
		element: on, bool
