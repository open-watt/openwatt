#
# Legend:
#
# request: name, METHOD, "path"
#	[format: template, body | form | list, param_name]
#	[parse: json | json, {key}.subpath | regex]
#	[root: json.path]
#	[success: expression]
#
# http: request, identifier, type, [enum_name,] [unit,]    desc: id [, display_unit] [, frequency]
#	[write: request [, format_key]]
#	[response: alt_path]
#
# Identifier: unquoted = JSON walk path (dots split), quoted = literal string key
# Types: bool, num, str, enum, dt, inetaddr, ipaddr, ip6addr
# Frequency: realtime (400ms), high (1s), medium (10s), low (60s), const (once), config
# Access: /RW after type for read-write, /W for write-only
#
# URL placeholders:
#	{key}/{value}   per-element request (one request per element)
#	{param_name}    substituted from profile parameters at device creation
#	?{key}={value}  expand-and-merge into query string (one pair per element)
#
# Body template placeholders (expand-and-merge):
#	{key}    element identifier (quoted as JSON string in body context)
#	{value}  element value (JSON-formatted)
#	Objects merge keys, arrays append across element expansions.
#
#
# SmartEVSE v3 REST API Profile
#
# API: Single GET /settings returns all data as nested JSON.
#       POST endpoints accept query params for writes.
#       No authentication required.
#
# Reference: https://github.com/SmartEVSE/SmartEVSE-3/blob/master/docs/REST_API.md
#

enum: EvseState
	not_connected: 0, "Not Connected"
	connected: 1, "Connected"
	charging: 2, "Charging"
	ventilation: 3, "Ventilation"
	comm_b: 4, "Comm B"
	comm_b_ok: 5, "Comm B OK"
	comm_c: 6, "Comm C"
	comm_c_ok: 7, "Comm C OK"
	activate: 8, "Activate"
	b1: 9, "B1"
	c1: 10, "C1"
	modem_request: 11, "Modem Request"
	modem_wait: 12, "Modem Wait"
	modem_done: 13, "Modem Done"
	modem_denied: 14, "Modem Denied"

enum: ChargeMode
	off: 0, "Off"
	normal: 1, "Normal"
	solar: 2, "Solar"
	smart: 3, "Smart"

enum: EnableC2
	not_present: 0, "Not present"
	always_off: 1, "Always Off"
	solar_off: 2, "Solar Off"
	always_on: 3, "Always On"
	auto: 4, "Auto"

enum: ErrorFlags
	less_6a: 1, "Less than 6A"
	ct_nocomm: 2, "No CT Communication"
	temp_high: 4, "Temperature High"
	ev_nocomm: 8, "No EV Communication"
	rcm_tripped: 16, "RCM Tripped"
	rcm_test: 32, "RCM Self-Test"
	test_io: 64, "I/O Test"
	bl_flash: 128, "Bootloader Flash"


requests:
	request: status, GET, "/settings"
	request: set_mode, POST, "/settings?{key}={value}"
		success: result == "OK"
	request: feed_currents, POST, "/currents?{keys}={values}"
	request: feed_ev_meter, POST, "/ev_meter?{keys}={values}"


elements:
	# Device info
	http: status, version, str,								desc: version, , const
	http: status, serialnr, num,							desc: serial_number, , const

	# EVSE state
	http: status, evse.state_id, enum, EvseState,			desc: state, , high
	http: status, evse.error_id, bf, ErrorFlags,			desc: error, , high
	http: status, evse.temp, num, °C,						desc: temp, °C, medium
	http: status, evse.temp_max, num, °C,					desc: temp_max, °C, const
	http: status, evse.connected, bool,						desc: evse_connected, , high
	http: status, evse.nrofphases, num,						desc: num_phases, , medium
	http: status, evse.pwm, num,							desc: pwm, , high
	http: status, car_connected, bool,						desc: car_connected, , high
	http: status, mode_id, enum, ChargeMode,				desc: mode, , high
		write: set_mode, mode

	# Current settings
	http: status, settings.charge_current, num, 100mA,		desc: charge_current, A, high
	http: status, settings.override_current, num, 100mA,	desc: override_current, A, high
		write: set_mode, override_current
	http: status, settings.current_min, num, A,				desc: current_min, A, config
	http: status, settings.current_max, num, A,				desc: current_max, A, config
	http: status, settings.current_main, num, A,			desc: current_main, A, config
	http: status, settings.current_max_circuit, num, A,		desc: current_max_circuit, A, config
	http: status, settings.enable_C2, enum, EnableC2,		desc: enable_c2, , config

	# Solar settings
	http: status, settings.solar_max_import, num, A,		desc: solar_max_import, A, config
	http: status, settings.solar_start_current, num, A,		desc: solar_start_current, A, config
	http: status, settings.solar_stop_time, num, min,		desc: solar_stop_time, min, config

	# EV meter data
	http: status, ev_meter.import_active_power, num, W,		desc: ev_power, W, realtime
	http: status, ev_meter.charged_wh, num, Wh,				desc: ev_session_energy, Wh, high
	http: status, ev_meter.total_wh, num, Wh,				desc: ev_total_energy, Wh, low
	http: status, ev_meter.currents.TOTAL, num, 100mA,		desc: ev_current_total, A, realtime
	http: status, ev_meter.currents.L1, num, 100mA,			desc: ev_current_l1, A, realtime
		write: feed_ev_meter, L1
	http: status, ev_meter.currents.L2, num, 100mA,			desc: ev_current_l2, A, realtime
		write: feed_ev_meter, L2
	http: status, ev_meter.currents.L3, num, 100mA,			desc: ev_current_l3, A, realtime
		write: feed_ev_meter, L3

	# Mains/phase currents
	http: status, phase_currents.TOTAL, num, 100mA,			desc: mains_current_total, A, realtime
	http: status, phase_currents.L1, num, 100mA,			desc: mains_current_l1, A, realtime
		write: feed_currents, L1
	http: status, phase_currents.L2, num, 100mA,			desc: mains_current_l2, A, realtime
		write: feed_currents, L2
	http: status, phase_currents.L3, num, 100mA,			desc: mains_current_l3, A, realtime
		write: feed_currents, L3

	# Home battery
	http: status, home_battery.current, num, 100mA,			desc: battery_current, A, high
		write: feed_currents, battery_current

#	# EV state (ISO 15118)
#	http: status, ev_state.computed_soc, num, %,			desc: ev_soc, %, high
#	http: status, ev_state.energy_capacity, num, Wh,		desc: ev_capacity, Wh, const
#	http: status, ev_state.energy_request, num, Wh,			desc: ev_energy_request, Wh, high
#	http: status, ev_state.time_until_full, num, min,		desc: ev_time_to_full, min, high

	# WiFi
	http: status, wifi.rssi, num, dBm,						desc: rssi, dBm, low
	http: status, wifi.ssid, str,							desc: wifi_ssid, , low
	http: status, wifi.bssid, str,							desc: wifi_bssid, , low
	http: status, wifi.status, str,							desc: wifi_status, , low

	# Write-only feed fields (ev_meter)
	http: feed_ev_meter, , num, W,							desc: feed_ev_power, W
		write: feed_ev_meter, import_active_power
	http: feed_ev_meter, , num, Wh,							desc: feed_ev_import_energy, Wh
		write: feed_ev_meter, import_active_energy
	http: feed_ev_meter, , num, Wh,							desc: feed_ev_export_energy, Wh
		write: feed_ev_meter, export_active_energy


device-template:
	component:
		id: info
		template: DeviceInfo
		element: type, "evse"
		element: name, "SmartEVSE"
		element-map: serial_number, @serial_number
		element-map: software_version, @version
	component:
		id: status
		template: DeviceStatus
		element-map: temp, @temp,							desc: °C
		element-map: temp_max, @temp_max,					desc: °C
		component:
			id: network
			template: Network
			component:
				id: wifi
				element-map: status, @wifi_status
				element-map: ssid, @wifi_ssid
				element-map: ssid, @wifi_bssid
				element-map: rssi, @rssi,					desc: dBm
	component:
		id: grid
		template: Port
		element: role, "grid"
		element: flow, "consume"
		component:
			id: meter
			template: EnergyMeter
			element: type, "three-phase"
			element-map: power, @ev_power,					desc: W, realtime
			element-map: current, @ev_current_total,			desc: A, realtime
			element-map: current1, @ev_current_l1,			desc: A, realtime
			element-map: current2, @ev_current_l2,			desc: A, realtime
			element-map: current3, @ev_current_l3,			desc: A, realtime
			element-map: import, @ev_total_energy,			desc: Wh
		component:
			id: control
			template: PowerControl
			element: kind, "continuous"
			element: direction, "consume"
			element: unit, "A"
			element: step, 1
			element-map: setpoint, @charge_current
			element-map: max, @current_max
			element-map: min, @current_min
	component:
		id: car
		template: Port
		element: role, "car"
		element: flow, "supply"
	component:
		id: evse
		template: EVSE
		element-map: state, @state
		element-map: error, @error
		element-map: connected, @car_connected
		element-map: mode, @mode
		element-map: pwm, @pwm
		element-map: num_phases, @num_phases
		element-map: session_energy, @ev_session_energy,	desc: Wh
#		component:
#			id: vehicle
#			template: Vehicle
#			element-map: soc, @ev_soc,						desc: %
#			element-map: battery_capacity, @ev_capacity,	desc: Wh
		component:
			id: config
			template: Configuration
			element-map: enable_c2, @enable_c2
			element-map: solar_max_import, @solar_max_import,		desc: A
			element-map: solar_start_current, @solar_start_current,	desc: A
			element-map: solar_stop_time, @solar_stop_time,			desc: min
		component:
			id: mains
			template: EnergyMeter
			element: type, "three-phase"
			element-map: current, @mains_current_total,			desc: A, realtime
			element-map: current1, @mains_current_l1,			desc: A, realtime
			element-map: current2, @mains_current_l2,			desc: A, realtime
			element-map: current3, @mains_current_l3,			desc: A, realtime
